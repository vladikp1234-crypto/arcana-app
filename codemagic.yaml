workflows:
  ionic-capacitor-ios:
    name: Arcana iOS Build
    max_build_duration: 120
    environment:
      node: 22.3.0
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vladik.arcana
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Give permission
        script: chmod +x node_modules/.bin/cap
      - name: Add iOS platform
        script: node_modules/.bin/cap add ios || true
      - name: Capacitor sync
        script: node_modules/.bin/cap sync ios
      - name: Build iOS
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=NZLX757KSZ \
            PROVISIONING_PROFILE=7f4b684b-77f6-4afe-bf5e-5227850965cc \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist /dev/stdin << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>NZLX757KSZ</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.vladik.arcana</key>
              <string>7f4b684b-77f6-4afe-bf5e-5227850965cc</string>
            </dict>
          </dict>
          </plist>
          EOF
    artifacts:
      - build/output/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: Codemagic
        submit_to_testflight: true