workflows:
  ionic-capacitor-ios:
    name: Arcana iOS Build
    max_build_duration: 120
    environment:
      node: 22.3.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Give permission
        script: chmod +x node_modules/.bin/cap
      - name: Add iOS platform
        script: node_modules/.bin/cap add ios
      - name: Capacitor sync
        script: node_modules/.bin/cap sync ios
      - name: Build web assets
        script: echo "Web assets ready"
    artifacts:
      - ios/App/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log