workflows:
  ionic-capacitor-ios:
    name: Arcana iOS Build
    max_build_duration: 120
    environment:
      node: 22.3.0
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vladik.arcana
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Give permission
        script: chmod +x node_modules/.bin/cap
      - name: Add iOS platform
        script: node_modules/.bin/cap add ios || true
      - name: Capacitor sync
        script: node_modules/.bin/cap sync ios
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=NZLX757KSZ \
            archive
    artifacts:
      - build/App.xcarchive
      - /tmp/xcodebuild_logs/*.log